<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FU House Finder</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #0f172a, #1e293b 55%, #334155);
            color: #e2e8f0;
        }
        .card {
            max-width: 560px;
            padding: 32px;
            border-radius: 20px;
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(148, 163, 184, 0.25);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
            text-align: center;
        }
        h1 {
            margin: 0 0 12px;
            font-size: 2rem;
        }
        p {
            margin: 0 0 20px;
            line-height: 1.6;
            color: #cbd5e1;
        }
        a {
            display: inline-block;
            padding: 12px 20px;
            border-radius: 999px;
            background: #38bdf8;
            color: #0f172a;
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>FU House Finder</h1>
        <p>The app is running. Use the link below to open the main JSP/Servlet application.</p>
        <a href="/HFManagementSystem/home">Open App</a>
    </div>
</body>
</html>
